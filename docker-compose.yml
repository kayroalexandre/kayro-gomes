# Banco Postgres para desenvolvimento local.
#
# Não usa .env.local (que contém secrets de produção do Vercel). Crie
# `.env.docker` apenas com as variáveis necessárias para o banco local.
#
# Exemplo de .env.docker:
#   POSTGRES_USER=postgres
#   POSTGRES_PASSWORD=postgres
#   POSTGRES_DB=kayro_local
#   DATABASE_URL=postgresql://postgres:postgres@localhost:54320/kayro_local
#   PAYLOAD_SECRET=dev-secret-troque-em-prod
#   BLOB_READ_WRITE_TOKEN=
#
# Suba com: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: kayro-postgres
    restart: unless-stopped
    ports:
      - '54320:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayro_local
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - path: .env.docker
        required: false

volumes:
  postgres-data:
