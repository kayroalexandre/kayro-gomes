name: CI

# Roda em: Pull Requests e pushes em develop/main.
# Gates: lint, typecheck, integration tests, build.
# Não roda E2E Playwright (esses são rodados no Vercel Preview
# automaticamente, em ambiente isolado).

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  test-int:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PAYLOAD_SECRET: ci-test-secret
      POSTGRES_URL: postgresql://test:test@localhost:5432/test
      PREVIEW_SECRET: ci-preview-secret
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done
      - name: Run Payload migrations
        run: bun payload migrate
      - run: bun run test:int

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test-int
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PAYLOAD_SECRET: ci-build-secret
      POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci
      PREVIEW_SECRET: ci-preview-secret
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      SKIP_ENV_VALIDATION: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U ci; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done
      - name: Generate Payload types
        run: bun generate:types
      - name: Generate Payload importmap
        run: bun generate:importmap
      - name: Build
        run: bun run build
