name: CI

# Roda em: Pull Requests e pushes em develop/main.
# Gates: lint, typecheck, integration tests, build.
# Não roda E2E Playwright (esses são rodados no Vercel Preview
# automaticamente, em ambiente isolado).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test-int:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      # Variáveis dummy para os testes não quebrarem no build.
      PAYLOAD_SECRET: ci-test-secret
      POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci
      BLOB_READ_WRITE_TOKEN: ci-blob-token
      PREVIEW_SECRET: ci-preview-secret
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:int
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test-int
    env:
      PAYLOAD_SECRET: ci-build-secret
      POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci
      BLOB_READ_WRITE_TOKEN: ci-blob-token
      PREVIEW_SECRET: ci-preview-secret
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      SKIP_ENV_VALIDATION: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Payload types
        run: pnpm generate:types
      - name: Generate Payload importmap
        run: pnpm generate:importmap
      - name: Build
        run: pnpm build
