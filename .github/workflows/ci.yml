name: CI

# Roda em: Pull Requests e pushes em develop/main.
# Gates: lint, typecheck, integration tests, build.
# Não roda E2E Playwright (esses são rodados no Vercel Preview
# automaticamente, em ambiente isolado).

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit

  test-int:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PAYLOAD_SECRET: ci-test-secret
      POSTGRES_URL: postgresql://test:test@localhost:5432/test
      BLOB_READ_WRITE_TOKEN: ci-blob-token
      PREVIEW_SECRET: ci-preview-secret
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test; then
              echo "Postgres ready"
              break
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 2
          done
      - run: pnpm run test:int

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test-int
    env:
      PAYLOAD_SECRET: ci-build-secret
      POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci
      BLOB_READ_WRITE_TOKEN: ci-blob-token
      PREVIEW_SECRET: ci-preview-secret
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      SKIP_ENV_VALIDATION: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Payload types
        run: pnpm generate:types
      - name: Generate Payload importmap
        run: pnpm generate:importmap
      - name: Build
        run: pnpm build
